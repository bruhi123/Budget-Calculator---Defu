<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Calculator</title>
    <link rel="stylesheet" href="home.css">
</head>

<body>
    <nav>
        <h1>Budget Calculator</h1>
    </nav>
    <main>
        <section class="Left-side">
            <section class="Income">
                <h2>Gross Income</h2>
                <section class="Income-Details">
                    <p>$</p>
                    <input type="number" class="income-amount" name="income-amount" id="income-amount">
                    <select name="income-frequency" id="income-frequency">
                        <option value="monthly">Monthly</option>
                        <option value="annually">Annually</option>
                        <option value="biweekly">Bi-Weekly</option>
                    </select>
                </section>
            </section>
            <section class="second-line">
                <section class="Needs">
                    <section class="Needs-var">
                        <h2>Needs</h2>
                        <img src="Images/Minus.png">
                    </section>
                    <section class="Needs-inputs">
                        <article class="housing">
                            <p>Housing</p>
                            <article class="input-fields">
                                <label for="housing-amount">$</label>
                                <input type="number" id="housing-amount">
                            </article>
                        </article>
                        <article class="utilities">
                            <p>Utilities</p>
                            <article class="input-fields">
                                <label for="utilities-amount">$</label>
                                <input type="number" id="utilities-amount">
                            </article>
                        </article>
                        <article class="food">
                            <p>Food</p>
                            <article class="input-fields">
                                <label for="food-amount">$</label>
                                <input type="number" id="food-amount">
                            </article>
                        </article>
                        <article class="healthcare">
                            <p>Healthcare</p>
                            <article class="input-fields">
                                <label for="healthcare-amount">$</label>
                                <input type="number" id="healthcare-amount">
                            </article>
                        </article>
                        <article class="loans">
                            <p>Loans</p>
                            <article class="input-fields">
                                <label for="loans-amount">$</label>
                                <input type="number" id="loans-amount">
                            </article>
                        </article>
                        <article class="add-expense">
                            <button>Add Expense</button>
                            <img src="Images/Plus.svg">
                        </article>
                    </section>

                </section>
                <section class="Wants">
                    <section class="Wants-var">
                        <h2>Wants</h2>
                        <img src="Images/Minus.png">
                    </section>
                    <section class="Wants-inputs">
                        <article class="housing">
                            <p>Housing</p>
                            <article class="input-fields">
                                <label for="housing-amount">$</label>
                                <input type="number" id="wants-housing-amount">
                            </article>
                        </article>
                        <article class="utilities">
                            <p>Utilities</p>
                            <article class="input-fields">
                                <label for="utilities-amount">$</label>
                                <input type="number" id="wants-utilities-amount">
                            </article>
                        </article>
                        <article class="food">
                            <p>Food</p>
                            <article class="input-fields">
                                <label for="food-amount">$</label>
                                <input type="number" id="wants-food-amount">
                            </article>
                        </article>
                        <article class="add-expense">
                            <button>Add Expense</button>
                            <img src="Images/Plus.svg">
                        </article>
                    </section>

                </section>
            </section>
            <section class="third-line">
                <section class="Savings">
                    <section class="Savings-var">
                        <h2>Savings</h2>
                        <img src="Images/Minus.png">
                    </section>
                    <section class="savings-inputs">
                        <article class="retirement">
                            <p>401K</p>
                            <article class="input-fields">
                                <label for="retirement-amount">$</label>
                                <input type="number" id="retirement-amount">
                            </article>
                        </article>
                        <article class="college-savings">
                            <p>College Savings</p>
                            <article class="input-fields">
                                <label for="college-amount">$</label>
                                <input type="number" id="college-amount">
                            </article>
                        </article>
                        <article class="emergency-fund">
                            <p>Emergency Fund</p>
                            <article class="input-fields">
                                <label for="emergency-amount">$</label>
                                <input type="number" id="emergency-amount">
                            </article>
                        </article>
                        <article class="add-expense">
                            <button>Add Expense</button>
                            <img src="Images/Plus.svg">
                        </article>

                    </section>

                </section>
                <section class="Misc">
                    <section class="Savings-var">
                        <h2>Misc</h2>
                        <img src="Images/Minus.png">
                    </section>
                    <article class="add-expense">
                        <button>Add Expense</button>
                        <img src="Images/Plus.svg">
                    </article>
                </section>
            </section>
        </section>
        <section class="Right-side">
            <section class="Summary">
                <p>Gross Monthly Income</p>
                <p>Gross Annual Income</p>
            </section>
        </section>
        <p id="final-budget">10</p>
    </main>
    <script src="calculator.js"></script>
</body>

</html>
